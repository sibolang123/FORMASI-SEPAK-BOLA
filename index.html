<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Formasi Sepakbola</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #f3f4f6;
        }
        
        .pitch {
            background: #2d8a4e;
            position: relative;
            aspect-ratio: 68/105;
            width: 100%;
            max-width: 450px;
            border: 4px solid rgba(255,255,255,0.9);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        .pitch::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 2px;
            background: rgba(255,255,255,0.7);
        }

        .pitch::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 25%; aspect-ratio: 1;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 50%;
        }

        .pitch-box-top, .pitch-box-bottom {
            position: absolute;
            left: 20%; width: 60%;
            height: 16%;
            border: 2px solid rgba(255,255,255,0.7);
        }
        .pitch-box-top { top: 0; border-top: none; }
        .pitch-box-bottom { bottom: 0; border-bottom: none; }

        .goal-area-top, .goal-area-bottom {
            position: absolute;
            left: 35%; width: 30%;
            height: 6%;
            border: 2px solid rgba(255,255,255,0.7);
        }
        .goal-area-top { top: 0; border-top: none; }
        .goal-area-bottom { bottom: 0; border-bottom: none; }

        .player {
            position: absolute;
            width: clamp(28px, 9%, 45px); 
            aspect-ratio: 1;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #1a1a2e;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; color: #1a1a2e;
            cursor: grab; user-select: none;
            transform: translate(-50%,-50%);
            transition: left 0.4s ease-out, top 0.4s ease-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            z-index: 10;
            touch-action: none;
        }
        
        .player:active { 
            cursor: grabbing; 
            transition: none; 
            transform: translate(-50%,-50%) scale(1.1);
        }
        
        .player.gk { 
            background: #fbbf24;
            border-color: #92400e; 
        }

        .formation-btn { 
            transition: all 0.2s ease; 
            background-color: #e5e7eb;
            color: #374151;
        }
        .formation-btn:hover {
            background-color: #d1d5db;
        }
        .formation-btn.active { 
            background-color: #1a1a2e !important; 
            color: #ffffff !important; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 gap-6 items-center">
    
    <div class="w-full max-w-xl mt-4">
        <img src="https://raw.githubusercontent.com/sibolang123/FORMASI-SEPAK-BOLA/refs/heads/main/GAMBAR.png" alt="Formasi Sepak Bola Banner" class="w-full h-auto rounded-lg shadow-md">
    </div>

    <header class="text-center mt-2">
        <h1 class="text-3xl font-bold text-gray-900">Taktik & Formasi</h1>
        <p class="text-gray-500 mt-1">Pilih formasi atau geser pemain secara manual.</p>
    </header>

    <nav class="flex flex-wrap justify-center gap-3" aria-label="Pilihan Formasi">
        <button id="btn-442" class="formation-btn px-4 py-2 rounded-full text-sm font-bold" onclick="setFormation('442')">4-4-2</button>
        <button id="btn-433" class="formation-btn px-4 py-2 rounded-full text-sm font-bold" onclick="setFormation('433')">4-3-3</button>
        <button id="btn-352" class="formation-btn px-4 py-2 rounded-full text-sm font-bold" onclick="setFormation('352')">3-5-2</button>
        <button id="btn-4231" class="formation-btn px-4 py-2 rounded-full text-sm font-bold" onclick="setFormation('4231')">4-2-3-1</button>
        <button id="btn-343" class="formation-btn px-4 py-2 rounded-full text-sm font-bold" onclick="setFormation('343')">3-4-3</button>
    </nav>

    <main class="w-full flex-grow flex justify-center pb-8">
        <div class="pitch" id="pitch">
            <div class="pitch-box-top"></div>
            <div class="goal-area-top"></div>
            <div class="pitch-box-bottom"></div>
            <div class="goal-area-bottom"></div>
        </div>
    </main>

    <script>
        const formations = {
            '442': [[50,93],[20,75],[40,75],[60,75],[80,75],[20,50],[40,50],[60,50],[80,50],[35,22],[65,22]],
            '433': [[50,93],[20,75],[40,75],[60,75],[80,75],[30,50],[50,50],[70,50],[20,22],[50,22],[80,22]],
            '352': [[50,93],[30,78],[50,78],[70,78],[15,55],[40,55],[60,55],[85,55],[50,45],[35,22],[65,22]],
            '4231': [[50,93],[20,78],[40,78],[60,78],[80,78],[35,58],[65,58],[20,38],[50,38],[80,38],[50,15]],
            '343': [[50,93],[30,75],[50,75],[70,75],[15,50],[40,50],[60,50],[85,50],[25,22],[50,22],[75,22]]
        };

        const pitch = document.getElementById('pitch');
        const players = [];

        for (let i = 0; i < 11; i++) {
            const el = document.createElement('div');
            el.className = 'player' + (i === 0 ? ' gk' : '');
            el.textContent = i === 0 ? 'GK' : (i + 1);
            pitch.appendChild(el);
            players.push(el);
            makeDraggable(el);
        }

        function setFormation(key) {
            const pos = formations[key];
            players.forEach((el, i) => {
                el.style.left = pos[i][0] + '%';
                el.style.top = pos[i][1] + '%';
            });
            
            document.querySelectorAll('.formation-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById(`btn-${key}`);
            if (btn) btn.classList.add('active');
        }

        function makeDraggable(el) {
            let dragging = false, startX, startY, startLeft, startTop;
            
            const start = (x, y) => {
                dragging = true;
                startX = x; startY = y;
                startLeft = parseFloat(el.style.left);
                startTop = parseFloat(el.style.top);
                el.style.transition = 'none';
                el.style.zIndex = 20;
            };
            
            const move = (x, y) => {
                if (!dragging) return;
                const rect = pitch.getBoundingClientRect();
                const dx = ((x - startX) / rect.width) * 100;
                const dy = ((y - startY) / rect.height) * 100;
                
                el.style.left = Math.max(5, Math.min(95, startLeft + dx)) + '%';
                el.style.top = Math.max(3, Math.min(97, startTop + dy)) + '%';
            };
            
            const end = () => { 
                dragging = false; 
                el.style.transition = 'left 0.4s ease-out, top 0.4s ease-out'; 
                el.style.zIndex = 10; 
            };

            el.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX, e.clientY); });
            document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
            document.addEventListener('mouseup', end);
            
            el.addEventListener('touchstart', e => { 
                const t = e.touches[0]; 
                start(t.clientX, t.clientY); 
            }, { passive: true });
            
            document.addEventListener('touchmove', e => { 
                if (dragging) {
                    const t = e.touches[0]; 
                    move(t.clientX, t.clientY); 
                }
            }, { passive: false });
            
            document.addEventListener('touchend', end);
        }

        setFormation('442');
    </script>
</body>
</html>
